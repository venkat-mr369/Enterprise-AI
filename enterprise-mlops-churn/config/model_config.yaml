models:
  random_forest:
    n_estimators: 200
    max_depth: 10
    min_samples_split: 4
    random_state: 42
    class_weight: "balanced"

  xgboost:
    n_estimators: 300
    max_depth: 6
    learning_rate: 0.05
    subsample: 0.8
    colsample_bytree: 0.8
    eval_metric: "logloss"
    random_state: 42

selection_metric: "roc_auc"

features:
  numeric:
    - tenure
    - MonthlyCharges
    - TotalCharges
    - CLV
    - AvgMonthlySpend
  categorical:
    - gender
    - SeniorCitizen
    - Partner
    - Dependents
    - InternetService
    - Contract
    - PaperlessBilling
    - PaymentMethod
