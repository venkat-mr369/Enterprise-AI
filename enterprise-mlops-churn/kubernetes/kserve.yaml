# Optional: serve the model via KServe's InferenceService abstraction
# instead of (or alongside) the FastAPI Deployment above. Useful for
# teaching students the "model-server" pattern used at larger orgs.
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: churn-model
  annotations:
    sidecar.istio.io/inject: "false"
spec:
  predictor:
    containers:
      - name: kserve-container
        image: churn-api:latest
        ports:
          - containerPort: 8000
        env:
          - name: APP_ENV
            value: "production"
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
