name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train model (produces artifacts consumed by tests)
        run: python -m src.train

      - name: Run tests
        run: pytest tests/ -v

      - name: Lint (flake8, non-blocking)
        run: |
          pip install flake8
          flake8 src api --max-line-length=100 --exit-zero

  build-image:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build container image
        run: docker build -t churn-api:${{ github.sha }} -f Containerfile .
